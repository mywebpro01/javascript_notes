
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Notes Q&A App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>📘 Q&A Notes App</h1>

  <div class="form">
    <input id="question" placeholder="Enter Question" />
    <input id="answer" placeholder="Enter Answer" />
    <input id="example" placeholder="Enter Example" />

    <button onclick="startVoice()">🎤 Voice Input</button>
    <button onclick="addNote()">➕ Add Note</button>
  </div>

  <div id="notesContainer"></div>

  <script src="script.js"></script>
</body>
</html>
